<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders | Cafe Brew Co</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    
    <!-- ===== NAVBAR ===== -->
     <nav class="navbar">
        <a href="index.html" class="nav-logo">☕ Cafe Brew Co</a>
        <div class="nav-links">
            <a href="products.html">Menu</a>
            <span id="nav-user"></span>
            <a href="auth.html" id="nav-auth">Login</a>
            <a href="cart.html" id="nav-cart">Cart</a>
            <a href="orders.html" id="nav-orders">Orders</a>
            <a href="#" id="nav-logout" onclick="logout()">Logout</a>
        </div>
     </nav>

     <!-- ===== ORDERS SECTION ===== -->
      <section class="section">
        <h2 class="section-title">My Orders</h2>
        <div id="orders-container">
            <p class="message">Loading orders...</p>
        </div>
      </section>

      <script src="js/api.js"></script>
      <script src="js/app.js"></script>
      <script>
        async function loadOrders() {
            if (!isLoggedIn()) {
                window.location.href = 'auth.html';
                return;
            }

            const orders = await getMyOrders();
            const container = document.getElementById('orders-container');

            if (orders.length === 0) {
                container.innerHTML = `
                <p class="message">No orders yet.</p>
                <div style="text-align:center;">
                    <a href="products.html" class="btn">Start Shopping</a>
                    </div>
                    `;
                    return;
            }

            container.innerHTML = orders.map(order => `
            <div class="order-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <div>
                        <p style="font-size:0.85rem; color:#7a5c3e;">Order ID: ${order._id}</p>
                        <p style="font-size:0.85rem; color:#7a5c3e;">
                            ${new Date(order.createdAt).toLocaleDateString('en-ph', {
                                year: 'numeric', month: 'long', day: 'numeric'
                            })}
                            </p>
                        </div>
                        <span class="order-status status-${order.status.toLowerCase()}">
                            ${order.status}
                            </span>
                        </div>
                        <div style="border-top:1px solid #f5e6d0; padding-top:16px;">
                            ${order.items.map(item => `
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                                <span>${item.product.name} x${item.quantity}</span>
                                <span>${item.priceAtPurchase * item.quantity}</span>
                                </div>
                                 `).join('')}
                                 </div>
                                 <div style="border-top:1px solid #f5e6d0; padding-top:16px; text-align:right;">
                                    <strong>Total: ₱${order.totalAmount}</strong>
                                    </div>
                                </div>
                            `).join('');
        }

        loadOrders();
      </script>
</body>
</html>
