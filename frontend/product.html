<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product | Cafe Brew Co</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- ===== NAVBAR ===== -->
     <nav class="navbar">
        <a href="index.html" class="nav-logo">☕ Cafe Brew Co</a>
        <div class="nav-links">
            <a href="products.html">Menu</a>
            <span id="nav-user"></span>
            <a href="auth.html" id="nav-auth">Login</a>
            <a href="cart.html" id="nav-cart">Cart</a>
            <a href="orders.html" id="nav-orders">Orders</a>
            <a href="#" id="nav-logout" onclick="logout()">Logout</a>
        </div>
     </nav>

     <!-- ===== PRODUCT DETAIL ===== -->
      <section class="section">
        <div class="product-detail" id="product-detail">
            <p class="message">Loading product....</p>
        </div>
      </section>

      <script src="js/api.js"></script>
      <script src="js/app.js"></script>
      <script>
        async function loadProduct() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (!id) {
                window.location.href = 'products.html';
                return;
            }

            const response = await fetch(`http://localhost:5000/api/products/${id}`);
            const product = await response.json();

            const detail = document.getElementById('product-detail');
            detail.innerHTML = `
            <a href="products.html" class="btn btn-outline" style="margin-bottom:24px; display:inline-block;">
                <- Back to Menu
                </a>
                <div class="product-detail-card">
                    <div class="product-detail-img">
                        ${product.image
                        ? `<img src="${product.image}" alt="${product.name}" />`
                        : `<div class="no-image" style="height:300px; font-size:5rem;">☕</div>`
                        } 
                        </div> 
                        <div class="product-detail-info">
                            <span class="product-tag">${product.category} ${product.temperature !== 'N/A' ? '· ' + product.temperature : ''}</span>
                            <h1>${product.name}</h1>
                            <p class="product-detail-desc">${product.description}</p>
                            <p class="product-price" style="font-size:1.8rem;">₱${product.price}</p>
                            <p style="color:#7a5c3e; margin-bottom:24px;">stock: ${product.stock} available</p>
                            <div class="quantity-selector">
                                <button onclick="changeQty(-1)">-</button>
                                <span id="qty">1</span>
                                <button onclick="changeQty(1)">+</button>
                                </div>
                                <button class="btn" style="margin-top:24px; width:100%;" onclick="handleAddToCart('${product._id}')">
                                    Add to Cart
                                    </button>
                                    </div>
                                    </div>
                                     `;
                                }
            function changeQty(amount) {
                const qtyEl = document.getElementById('qty');
                const current = parseInt(qtyEl.textContent);
                const newQty = current + amount;
                if (newQty >= 1) qtyEl.textContent = newQty;
            }

            async function handleAddToCart(productId) {
                if (!isLoggedIn()) {
                    alert('Please login to add items to cart!');
                    window.location.href = 'auth.html';
                    return;
                }
                const quantity = parseInt(document.getElementById('qty').textContent);
                const data = await addToCart(productId, quantity);
                if (data.items) {
                    alert('Added to cart successfully!');
                    window.location.href = 'cart.html';
                } else {
                    alert(data.message);
                }
            }

            loadProduct();
      </script>
    
</body>
</html>
