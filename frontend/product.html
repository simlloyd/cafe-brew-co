<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Cafe Brew Co</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <a href="index.html" class="nav-logo">☕ Cafe Brew Co</a>
        <div class="nav-links">
            <a href="products.html">Menu</a>
            <span id="nav-user"></span>
            <a href="auth.html" id="nav-auth">Login</a>
            <a href="cart.html" id="nav-cart">Cart</a>
            <a href="orders.html" id="nav-orders">Orders</a>
            <a href="#" id="nav-logout" onclick="logout()">Logout</a>
        </div>
    </nav>

    <!-- ===== PRODUCTS SECTION ===== -->
     <section class="section">
        <h2 class="section-title">Our Menu</h2>

        <!-- ===== CATEGORY FILTERS ===== -->
         <div class="filters">
            <button class="filter-btn active" onclick="filterProducts('All')">All</button>
            <button class="filter-btn" onclick="filterProducts('Coffee')">Coffee</button>
            <button class="filter-btn" onclick="filterProducts('Non-Coffee')">Non-Coffee</button>
            <button class="filter-btn" onclick="filterProducts('Pastry')">Pastry</button>
         </div>

         <!-- ===== PRODUCTS GRID ===== -->
          <div class="products-grid" id="products-grid">
            <p class="message">Loading producs...</p>
          </div>
     </section>

     <script src="js/api.js"></script>
     <script src="js/app.js"></script>
     <script>
        let allProducts = [];

        async function loadProducts(){
            allProducts = await getProducts();
            renderProducts(allProducts);
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');

            if (products.length === 0) {
                grid.innerHTML = '<p class="message">No products found.</p>';
                return;
            }

            grid.innerHTML = products.map(product => `
            <div class="product-card" onclick="window.location.href='product.html?id=${product._id}'">
                <div class="product-img-placeholder">
                    ${product.image
                    ? `<img src="${product.image}" alt="${product.name}" />`
                    : `<div class="no-image">☕</div>`
                    }
                    </div>
                    <div class="product-card-body">
                        <h3>${product.name}</h3>
                        <p>${product.description}</p>
                        <div class="product-card-footer">
                            <span class="product-price">₱${product.price}</span>
                            <span class="product-tag">${product.category}</span>
                            </div>
                            </div>
                            </div>
            `).join('');
        }

        function filterProducts(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === category) btn.classList.add('active');
            });

            if (category === 'All') {
                renderProducts(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.category === category);
                renderProducts(filtered);
            }
        }

        loadProducts();
     </script>
</body>
</html>
